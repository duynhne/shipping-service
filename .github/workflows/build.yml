name: Build

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read
  security-events: write

jobs:
  go-check:
    uses: duyhenryer/shared-workflows/.github/workflows/go-check.yml@main
    with:
      command-test: 'go test -race -coverprofile=coverage.out ./...'
      lint: true
    secrets: inherit

  sonar:
    needs: go-check
    uses: duyhenryer/shared-workflows/.github/workflows/sonarqube.yml@main
    with:
      project-key: 'duynhlab_shipping-service'
      organization: 'duynhlab'
      fail-on-quality-gate: false
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    needs: [go-check, sonar]
    uses: duyhenryer/shared-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: 'shipping'
      push: true
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  trivy-scan:
    needs: [docker-build]
    uses: duyhenryer/shared-workflows/.github/workflows/trivy-scan.yml@main
    with:
      image-ref: ghcr.io/${{ github.repository }}/shipping@${{ needs.docker-build.outputs.digest }}
      severity: 'CRITICAL,HIGH'
      exit-code: '1'
      ignore-unfixed: true
    secrets: inherit
    permissions:
      contents: read
      packages: read
      security-events: write

  docker-sign:
    needs: [docker-build, trivy-scan]
    uses: duyhenryer/shared-workflows/.github/workflows/docker-sign.yml@main
    with:
      tags: ${{ needs.docker-build.outputs.tags }}
      digest: ${{ needs.docker-build.outputs.digest }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write

  docker-db-init:
    needs: [go-check, sonar]
    uses: duyhenryer/shared-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: 'shipping-init'
      dockerfile: 'db/migrations/Dockerfile'
      context: 'db/migrations'
      push: true
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  notify:
    if: always()
    needs: [go-check, sonar, docker-build, trivy-scan, docker-sign, docker-db-init]
    uses: duyhenryer/shared-workflows/.github/workflows/status.yml@main
    with:
      slack_channel_id: "C0AD82A9A74"
      gsheet_spreadsheet_id: "1F2VUrAOyMGnETApp5yA-ldCW81ConiQXnWYZVxKas_0"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      GSHEET_CLIENT_EMAIL: ${{ secrets.GSHEET_CLIENT_EMAIL }}
      GSHEET_PRIVATE_KEY: ${{ secrets.GSHEET_PRIVATE_KEY }}
